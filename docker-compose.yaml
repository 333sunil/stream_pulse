version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stream_pulse_postgres
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: streampulse
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d streampulse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stream_pulse_network

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: stream_pulse_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - stream_pulse_network

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  stream_pulse_network:
    driver: bridge
